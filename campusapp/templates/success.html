<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box{
            background: white;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
            width: 400px;
        }

        h1{
            color: green;
            margin-bottom: 20px;
        }

        p{
            font-size: 18px;
            color: #444;
        }

        a{
            display: inline-block;
            margin-top: 25px;
            background: darkblue;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover{
            background: black;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>
            Registration Successful
        </h1>

        <p>
            Thank you for registering for the event.
        </p>

        <a href="/">
            Back to Home
        </a>

    </div>

</body>
</html>
