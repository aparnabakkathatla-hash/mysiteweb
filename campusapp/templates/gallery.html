<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        h1{
            text-align: center;
            color: darkblue;
            margin-top: 30px;
        }

        .gallery{
            width: 90%;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .gallery img{
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            transition: 0.3s;
        }

        .gallery img:hover{
            transform: scale(1.05);
        }

        .back{
            text-align: center;
            margin-bottom: 40px;
        }

        .back a{
            text-decoration: none;
            background-color: darkblue;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
        }

    </style>
</head>

<body>

    <h1>Campus Events Gallery</h1>

    <div class="gallery">

        <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94">

        <img src="https://images.unsplash.com/photo-1511578314322-379afb476865">

        <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">

        <img src="https://images.unsplash.com/photo-1505373877841-8d25f7d46678">

        <img src="https://images.unsplash.com/photo-1515169067868-5387ec356754">

        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">

    </div>

    <div class="back">

        <a href="/">
            Back to Home
        </a>

    </div>

</body>
</html>
