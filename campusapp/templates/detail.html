<!DOCTYPE html>
<html>
<head>
    <title>{{ event.title }}</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 80%;
            margin: auto;
            background: white;
            margin-top: 40px;
            margin-bottom: 40px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
        }

        img{
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }

        h1{
            color: darkblue;
            margin-top: 20px;
        }

        .info{
            margin-top: 20px;
            font-size: 18px;
        }

        form{
            margin-top: 30px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid gray;
            font-size: 16px;
        }

        button{
            background: darkblue;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: black;
        }

        .back{
            margin-top: 25px;
        }

        .back a{
            text-decoration: none;
            color: darkblue;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <img src="{{ event.image.url }}">

        <h1>{{ event.title }}</h1>

        <div class="info">

            <p><b>Description:</b> {{ event.description }}</p>

            <p><b>Date:</b> {{ event.date }}</p>

            <p><b>Category:</b> {{ event.category }}</p>

            <p><b>Capacity:</b> {{ event.capacity }}</p>

        </div>

        <h2>Register for this Event</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Submit Registration
            </button>

        </form>

        <div class="back">

            <a href="/">
                ← Back to Home
            </a>

        </div>

    </div>

</body>
</html>
